<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chat with Luis Sanabria | Red One Realty</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f4f4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.chat-container{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.10);width:100%;max-width:480px;overflow:hidden;display:flex;flex-direction:column;height:90vh;max-height:700px}
.chat-header{background:#CC0000;padding:18px 20px;display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#CC0000;flex-shrink:0}
.header-info{}
.header-name{color:#fff;font-weight:700;font-size:16px}
.header-title{color:#ffcccc;font-size:12px;margin-top:2px}
.online-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;display:inline-block;margin-right:4px}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.message{max-width:80%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5}
.message.bot{background:#f4f4f4;color:#111;border-radius:16px 16px 16px 4px;align-self:flex-start}
.message.user{background:#CC0000;color:#fff;border-radius:16px 16px 4px 16px;align-self:flex-end}
.typing{display:flex;gap:4px;padding:12px 16px;background:#f4f4f4;border-radius:16px 16px 16px 4px;align-self:flex-start;width:60px}
.typing span{width:8px;height:8px;background:#aaa;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.chat-input-area{padding:16px;border-top:1px solid #eee;display:flex;gap:8px}
.chat-input{flex:1;border:1.5px solid #e0e0e0;border-radius:24px;padding:10px 16px;font:inherit;font-size:14px;outline:none;transition:border .2s}
.chat-input:focus{border-color:#CC0000}
.send-btn{background:#CC0000;color:#fff;border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.send-btn:hover{background:#aa0000}
.send-btn:disabled{background:#ccc;cursor:not-allowed}
.chat-footer{text-align:center;padding:10px;font-size:11px;color:#aaa;border-top:1px solid #f0f0f0}
.chat-footer a{color:#CC0000;text-decoration:none}
.success-banner{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:12px 16px;font-size:13px;color:#166534;text-align:center;margin:0 20px 12px}
/* Language selector */
.lang-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:24px}
.lang-title{font-family:Georgia,serif;font-size:22px;font-weight:900;color:#111;line-height:1.4}
.lang-title span{color:#CC0000}
.lang-subtitle{font-size:14px;color:#666;line-height:1.6}
.lang-buttons{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.lang-btn{background:#fff;border:2px solid #CC0000;color:#CC0000;font-family:inherit;font-size:15px;font-weight:700;padding:14px 28px;border-radius:50px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.lang-btn:hover{background:#CC0000;color:#fff}
.lang-badge{font-size:22px}
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">LS</div>
    <div class="header-info">
      <div class="header-name">Luis Sanabria's Assistant</div>
      <div class="header-title"><span class="online-dot"></span>Red One Realty · Central Ohio</div>
    </div>
  </div>

  <!-- Language Selection Screen -->
  <div class="lang-screen" id="langScreen">
    <div class="lang-title">Welcome to <span>Red One Realty</span><br/>¡Bienvenido a Red One Realty!</div>
    <div class="lang-subtitle">Please choose your language<br/>Por favor elige tu idioma</div>
    <div class="lang-buttons">
      <button class="lang-btn" onclick="selectLanguage('english')">
        <span class="lang-badge">🇺🇸</span> English
      </button>
      <button class="lang-btn" onclick="selectLanguage('spanish')">
        <span class="lang-badge">🇲🇽</span> Español
      </button>
    </div>
  </div>

  <!-- Chat Screen (hidden until language selected) -->
  <div class="chat-messages" id="messages" style="display:none"></div>

  <div class="chat-input-area" id="inputArea" style="display:none">
    <input class="chat-input" id="userInput" type="text" placeholder="Type your message..." onkeypress="handleKey(event)"/>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>

  <div class="chat-footer">
    Powered by AI · <a href="https://luissanabria.red1realty.com" target="_blank">luissanabria.red1realty.com</a>
  </div>
</div>

<script>
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbyXQE8SWAXiOtthWRhgtyDQ3_5P_E3LZUONw_uUOm5Lu2u21Bc9_VcdNy_WI3NIMoG8wg/exec";

let history = [];
let leadCaptured = false;
let selectedLanguage = "english";

function selectLanguage(lang) {
  selectedLanguage = lang;

  // Hide language screen, show chat
  document.getElementById("langScreen").style.display = "none";
  document.getElementById("messages").style.display = "flex";
  document.getElementById("inputArea").style.display = "flex";

  // Update placeholder based on language
  const input = document.getElementById("userInput");
  input.placeholder = lang === "spanish" ? "Escribe tu mensaje..." : "Type your message...";

  // Send greeting based on language
  setTimeout(() => {
    if (lang === "spanish") {
      addMessage("bot", "¡Hola! 👋 Soy el asistente de Luis Sanabria en Red One Realty en Ohio Central. ¡Estoy aquí para ayudarte con todas tus necesidades de bienes raíces! ¿Estás buscando comprar o vender una casa?");
    } else {
      addMessage("bot", "Hi there! 👋 I'm Luis Sanabria's assistant at Red One Realty in Central Ohio. I'm here to help you with all your real estate needs! Are you looking to buy or sell a home?");
    }
  }, 400);
}

function handleKey(e) {
  if (e.key === "Enter") sendMessage();
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const text = input.value.trim();
  if (!text || leadCaptured) return;

  addMessage("user", text);
  history.push({ role: "user", content: text });
  input.value = "";
  sendBtn.disabled = true;

  showTyping();

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        message: text,
        history: history,
        language: selectedLanguage
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      const errMsg = selectedLanguage === "spanish"
        ? "Lo siento, algo salió mal. ¡Por favor intenta de nuevo!"
        : "Sorry, something went wrong. Please try again!";
      addMessage("bot", errMsg);
    } else {
      addMessage("bot", data.message);
      history.push({ role: "assistant", content: data.message });

      if (data.leadCaptured) {
        leadCaptured = true;
        setTimeout(() => showSuccessBanner(), 500);
        input.disabled = true;
        sendBtn.disabled = true;
        input.placeholder = selectedLanguage === "spanish"
          ? "¡Gracias! Luis se pondrá en contacto pronto 🎉"
          : "Thanks! Luis will be in touch soon 🎉";
      }
    }
  } catch(e) {
    hideTyping();
    const errMsg = selectedLanguage === "spanish"
      ? "Lo siento, estoy teniendo problemas para conectarme. ¡Por favor intenta de nuevo!"
      : "Sorry, I'm having trouble connecting. Please try again in a moment!";
    addMessage("bot", errMsg);
  }

  sendBtn.disabled = false;
}

function addMessage(role, text) {
  const messages = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

let typingEl = null;
function showTyping() {
  const messages = document.getElementById("messages");
  typingEl = document.createElement("div");
  typingEl.className = "typing";
  typingEl.innerHTML = "<span></span><span></span><span></span>";
  messages.appendChild(typingEl);
  messages.scrollTop = messages.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function showSuccessBanner() {
  const container = document.querySelector(".chat-container");
  const inputArea = document.querySelector(".chat-input-area");
  const banner = document.createElement("div");
  banner.className = "success-banner";
  banner.innerHTML = selectedLanguage === "spanish"
    ? "✅ <strong>¡Todo listo!</strong> Luis se pondrá en contacto contigo pronto."
    : "✅ <strong>You're all set!</strong> Luis will reach out to you shortly.";
  container.insertBefore(banner, inputArea);
}
</script>
</body>
</html>
